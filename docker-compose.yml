version: '3.8'

services:
  # Database Service (PostgreSQL)
  postgres:
    image: postgres:15-alpine
    container_name: shieldpanel_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Message Broker (RabbitMQ with Management plugin)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: shieldpanel_mq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${HOST_RABBIT_MGMT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # PHP-FPM Service (cPanel simulation backend control layer)
  php-app:
    build: ./cpanel-plugin
    container_name: shieldpanel_php
    volumes:
      - ./cpanel-plugin:/var/www/html
      - /var/www/html/vendor  # Keep vendor dir inside container from being overwritten
      - ./shared:/shared
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS}
      ACCESS_LOG_PATH: ${ACCESS_LOG_PATH}
      ERROR_LOG_PATH: ${ERROR_LOG_PATH}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Nginx Service (Reverse proxy for PHP-FPM and static files)
  nginx:
    build: ./nginx
    container_name: shieldpanel_nginx
    ports:
      - "${HOST_WEB_PORT:-8080}:80"
    volumes:
      - ./cpanel-plugin:/var/www/html
    depends_on:
      - php-app

  # Go Security Worker (Analyzes logs, scoring, writes findings)
  go-worker:
    build: ./go-worker
    container_name: shieldpanel_worker
    volumes:
      - ./shared:/shared
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_PASS: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_PASS: ${RABBITMQ_DEFAULT_PASS}
      ACCESS_LOG_PATH: ${ACCESS_LOG_PATH}
      ERROR_LOG_PATH: ${ERROR_LOG_PATH}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data:
